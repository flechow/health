<html lang="pl">
<head>

<style>
  :root{
    --bg:#0a0a0a; --card:#161616; --card2:#1c1c1c; --bd:#262626;
    --tx:#ececec; --mut:#8a8a8a; --mut2:#6a6a6a;
    --amber:#f59e0b; --amber-l:#fbbf24; --indigo:#6366f1; --green:#10b981; --red:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));}
  .wrap{max-width:460px; margin:0 auto;}
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin:0;}
  h1{font-size:18px; margin:2px 0 0; font-weight:600;}
  .card{background:var(--card); border:1px solid var(--bd); border-radius:18px; padding:18px; margin-top:14px;}
  .label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); margin:0;}
  .mono{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  .big{font-size:54px; line-height:1; font-weight:600; letter-spacing:-.02em;}
  .sub{color:var(--mut); font-size:14px; margin-top:8px;}
  .track{height:10px; border-radius:999px; background:#232323; overflow:hidden; margin-top:14px;}
  .fill{height:100%; border-radius:999px; background:linear-gradient(90deg,#d97706,#fbbf24);}
  .scale{display:flex; justify-content:space-between; font-size:11px; color:var(--mut2); margin-top:5px;}
  .row{display:flex; align-items:flex-start; gap:12px; margin-top:10px;}
  .ic{font-size:24px; line-height:1;}
  .plan-name{font-weight:600; font-size:16px;}
  .plan-det{color:var(--mut); font-size:13.5px; margin-top:3px;}
  button.act{width:100%; border:0; border-radius:14px; padding:15px; font-size:15px; font-weight:600;
    margin-top:14px; cursor:pointer; transition:.15s; color:var(--tx); background:#232323;}
  button.act:active{background:#2c2c2c;}
  button.act.done{background:var(--amber); color:#0a0a0a;}
  button.sleep{margin-top:9px; padding:12px; font-size:14px; font-weight:500;}
  button.sleep.on{background:var(--indigo); color:#0a0a0a;}
  .week{display:flex; justify-content:space-between; margin-top:14px;}
  .d{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .d .lab{font-size:11px; color:var(--mut);}
  .d .lab.t{color:var(--amber);}
  .dot{width:30px; height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:600; border:1px solid #2f2f2f; color:#5a5a5a;}
  .dot.t{border-color:var(--amber); color:var(--mut);}
  .dot.on{background:var(--amber); color:#0a0a0a; border-color:var(--amber);}
  .between{display:flex; align-items:center; justify-content:space-between;}
  input[type=text]{flex:1; background:#232323; border:1px solid #2f2f2f; border-radius:12px;
    padding:13px; color:var(--tx); font-size:16px; outline:none;}
  input[type=text]:focus{border-color:var(--amber);}
  .btn-sm{border:0; border-radius:12px; padding:0 18px; background:var(--amber); color:#0a0a0a;
    font-weight:600; font-size:14px; cursor:pointer;}
  .flex{display:flex; gap:8px; margin-top:14px;}
  .circ-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-top:12px}
  .circ-l{display:flex;flex-direction:column;font-size:12px;color:var(--mut);gap:4px}
  .circ-l input{width:64px}
  .metrics{display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; margin-top:14px;}
  .m .mv{font-size:24px; font-weight:600;}
  .m .ml{font-size:12px; color:var(--mut); margin-top:2px;}
  .arrow{font-size:13px; margin-left:6px;}
  .up{color:var(--green);} .down{color:var(--red);}
  .tgt{display:flex; align-items:center; justify-content:space-between; padding:9px 0;}
  .tgt+.tgt{border-top:1px solid #1f1f1f;}
  .tgt .n{font-size:14px; font-weight:500;}
  .tgt .note{font-size:12px; color:var(--mut2);}
  .imp{display:block; text-align:center; border:1px dashed #3a3a3a; border-radius:14px; padding:14px;
    color:var(--mut); font-size:14px; cursor:pointer; margin-top:14px;}
  .imp b{color:var(--amber);}
  .foot{text-align:center; color:var(--mut2); font-size:11px; margin-top:18px;}
  .stamp{font-size:11px; color:var(--mut2); margin-top:10px;}
  svg{display:block; width:100%;}
  .wk{font-size:12px; color:var(--mut); margin-top:2px;}
  .ex{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 0;}
  .ex+.ex{border-top:1px solid #1f1f1f;}
  .ex .exn{font-size:14px; font-weight:500;}
  .ex .exs{font-size:12px; color:var(--mut2); margin-top:2px;}
  .ex .exw{display:flex; flex-direction:column; align-items:flex-end; flex:0 0 auto;}
  .ex input{width:88px; background:#232323; border:1px solid #2f2f2f; border-radius:10px;
    padding:9px; color:var(--tx); font-size:15px; text-align:right; outline:none;}
  .ex input:focus{border-color:var(--amber);}

  button.refresh{width:100%; border:0; border-radius:14px; padding:14px; font-size:14px; font-weight:600;

  button.refresh:active{background:#2c2c2c;}
  button.refresh:disabled{opacity:.55; cursor:default;}
  /* Silnik Dnia */
  .hero{display:flex; gap:16px; align-items:center; margin-top:14px;}
  .ringwrap{flex:0 0 auto;}
  .htxt{flex:1; min-width:0;}
  .focus-t{font-size:17px; font-weight:600; letter-spacing:-.01em; line-height:1.2;}
  .focus-w{font-size:13px; color:var(--mut); margin-top:5px; line-height:1.45;}
  .zonepill{display:inline-block; font-size:11px; font-weight:600; padding:3px 10px; border-radius:999px;}
  .z-green{background:rgba(16,185,129,.15); color:#34d399;}
  .z-yellow{background:rgba(245,158,11,.16); color:#fbbf24;}
  .z-red{background:rgba(239,68,68,.15); color:#f87171;}
  .z-none{background:#232323; color:var(--mut);}
  .intens{display:flex; gap:8px; align-items:baseline; margin-top:12px; padding:11px 13px;
    background:var(--card2); border-radius:12px; font-size:13px; color:var(--tx); line-height:1.4;}
  .intens .il{color:var(--amber-l); font-size:10.5px; font-weight:600; text-transform:uppercase;
    letter-spacing:.08em; flex:0 0 auto;}
  .facts{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
  .fact{display:flex; align-items:center; gap:6px; font-size:11.5px; background:var(--card2);
    border:1px solid var(--bd); border-radius:999px; padding:4px 10px; color:var(--mut);}
  .fact b{color:var(--tx); font-weight:600;}
  .fdot{width:7px; height:7px; border-radius:999px; flex:0 0 auto;}
  /* Progresja siły */
  .exhist{font-size:11.5px; color:var(--mut2); margin-top:4px; font-variant-numeric:tabular-nums;}
  .chip{display:inline-block; background:rgba(245,158,11,.16); color:var(--amber-l); border-radius:8px;
    padding:1px 7px; font-weight:600; font-size:11px;}
  /* Etap 2 + interaktywne objaśnienia */
  .info{display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px;
    border-radius:999px; border:1px solid #3a3a3a; color:var(--mut2); font-size:10px; font-weight:700;
    font-style:italic; margin-left:5px; vertical-align:middle; font-family:Georgia,serif;}
  [data-info]{cursor:pointer;}
  .prio{display:flex; gap:11px; align-items:flex-start; padding:11px 0;}
  .prio+.prio{border-top:1px solid #1f1f1f;}
  .prio .pic{font-size:20px; line-height:1.1; flex:0 0 auto;}
  .prio .pt{font-size:14px; font-weight:600; line-height:1.25;}
  .prio .pn{font-size:12.5px; color:var(--mut); margin-top:3px; line-height:1.4;}
  .prio .rank{margin-left:auto; font-size:11px; color:var(--mut2); font-variant-numeric:tabular-nums; padding-top:2px;}
  .acwr-top{display:flex; align-items:center; gap:11px; margin-top:8px;}
  .acwr-v{font-size:34px; font-weight:600; line-height:1;}
  .acwr-lab{font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px;}
  .acwr-bar{position:relative; height:10px; border-radius:999px; background:#232323; margin-top:16px;}
  .acwr-sweet{position:absolute; top:0; bottom:0; background:rgba(16,185,129,.30); border-radius:2px;}
  .acwr-mark{position:absolute; top:-3px; width:3px; height:16px; border-radius:2px; background:var(--tx);}
  .acwr-sc{display:flex; justify-content:space-between; font-size:11px; color:var(--mut2); margin-top:6px;}
  .phase-card{background:linear-gradient(135deg,#1c1810,#161616); border-color:#3a2f14;}
  .sheet{position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:flex-end;
    justify-content:center; z-index:50; opacity:0; transition:opacity .18s;}
  .sheet.on{opacity:1;}
  .sheet-card{background:var(--card); border:1px solid var(--bd); border-bottom:0;
    border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    width:100%; max-width:460px; transform:translateY(100%); transition:transform .22s;
    max-height:82vh; overflow-y:auto;}
  .sheet.on .sheet-card{transform:translateY(0);}
  .sheet .grip{width:38px; height:4px; border-radius:999px; background:#333; margin:0 auto 14px;}
  .sheet h3{margin:0; font-size:18px; font-weight:600;}
  .sheet .sbody{font-size:14px; color:var(--tx); line-height:1.55; margin-top:12px;}
  .sheet .sbody p{margin:0 0 11px;}
  .sheet .sbody .t{color:var(--amber-l); font-weight:600;}
  .sheet .close{width:100%; margin-top:6px; border:0; border-radius:14px; padding:13px; font-size:15px;
    font-weight:600; background:#232323; color:var(--tx); cursor:pointer;}
  .toggle{display:inline-block; margin-top:8px; font-size:12px; color:var(--mut); cursor:pointer;
    border:1px solid var(--bd); border-radius:999px; padding:6px 13px;}
  .toggle b{color:var(--amber-l); font-weight:600;}
  /* Postępy */
  .seg{display:flex; gap:6px; background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:5px; margin-top:14px;}
  .segb{flex:1; border:0; border-radius:10px; padding:10px; font-size:14px; font-weight:600; background:transparent; color:var(--mut); cursor:pointer;}
  .segb.on{background:#232323; color:var(--tx);}
  .trend{padding:12px 0;} .trend+.trend{border-top:1px solid #1f1f1f;}
  .trend .n{font-size:14px; font-weight:500;}
  .exprog{padding:12px 0;} .exprog+.exprog{border-top:1px solid #1f1f1f;}
  .exprog .n{font-size:14px; font-weight:500;}
  .bars{display:flex; align-items:flex-end; gap:6px; height:110px; margin-top:10px;}
  .bar{flex:1; display:flex; flex-direction:column; align-items:center; height:100%;}
  .bwrap{flex:1; width:100%; display:flex; align-items:flex-end; background:#1a1a1a; border-radius:6px; overflow:hidden;}
  .bfill{width:100%; border-radius:6px 6px 0 0; min-height:2px;}
  .blab{font-size:10px; color:var(--mut2); margin-top:5px; font-variant-numeric:tabular-nums;}
</style>

<body>
<div class="wrap" id="app"></div>
<input type="file" id="csv" accept=".csv,text/csv" style="display:none" />

<script>
const START=116, GOAL=90;
const WL=["Pn","Wt","Śr","Cz","Pt","So","Nd"];

// ===== FEATURE FLAG: interaktywne objaśnienia (dotknij metryki -> wytłumaczenie) =====
// Domyślnie WŁĄCZONE. Możesz wyłączyć jednym dotknięciem w stopce apki (zapis w localStorage),
// albo na stałe zmieniając poniższą wartość na false.
const EXPLAIN_DEFAULT = true;
function explainOn(){ const v=load('explain-v1', null); return v==null ? EXPLAIN_DEFAULT : !!v; }
function setExplain(on){ save('explain-v1', !!on); }
function ib(key){ return explainOn() ? ` <span class="info" data-info="${key}">i</span>` : ""; }   // znaczek + cel
function ic(){ return explainOn() ? ` <span class="info">i</span>` : ""; }                          // sam znaczek (kontener ma data-info)

// Plan treningowy. ZRODLO PRAWDY to plik plan.json (pobierany przy kazdym wejsciu).
// DEFAULT_PLAN to tylko kopia awaryjna na offline / pierwsze uruchomienie — edytuj plan.json, nie to.
const DEFAULT_PLAN={
 goal:{start:116,target:90}, activePhase:1,
 phases:[
  { id:1, subtitle:"Faza 1", name:"Baza tlenowa", startDate:"2026-06-29", weeks:10,
    focus:"Silnik tlenowy + wzorce ruchowe.",
    cardio:{baseMin:35,stepMin:5,everyWeeks:2,capMin:50,zone:"tętno 125–140 · oddech nosem"},
    nutrition:{proteinG:180,kcalTarget:2200,kcalFloor:1850},
    body:{waistCm:100,bodyFatPct:15},
    days:{
     "1":{type:"cardio",name:"Zone 2 — orbitrek",icon:"🚴",detail:"spokojne, równe tempo"},
     "2":{type:"strength",name:"Siła A — full body",icon:"💪",detail:"tempo spokojne, pełen zakres ruchu",exercises:[
        {id:"a-squat",name:"Przysiad goblet",scheme:"3×10",note:"2 powt. w zapasie"},
        {id:"a-row",name:"Wiosłowanie hantlą",scheme:"3×10",note:"łopatki ściągnięte"},
        {id:"a-press",name:"Wyciskanie nad głowę",scheme:"3×10",note:"brzuch napięty"},
        {id:"a-plank",name:"Plank",scheme:"3×30 s",note:"biodra w linii"}]},
     "3":{type:"cardio",name:"Zone 2 — bieżnia",icon:"🏃",detail:"marsz pod górę lub lekki trucht"},
     "4":{type:"strength",name:"Siła B — full body",icon:"💪",detail:"tempo spokojne, pełen zakres ruchu",exercises:[
        {id:"b-rdl",name:"Martwy ciąg rumuński",scheme:"3×10",note:"plecy proste"},
        {id:"b-lunge",name:"Wykrok",scheme:"3×10/nogę",note:"kolano nad kostką"},
        {id:"b-push",name:"Pompki (lub z kolan)",scheme:"3×max",note:"zapisz liczbę powt."},
        {id:"b-farmer",name:"Farmer's walk",scheme:"3×40 m",note:"sylwetka wyprostowana"}]},
     "5":{type:"cardio",name:"Zone 2 — dowolnie",icon:"🚴",detail:"spokojnie, cokolwiek lubisz"},
     "6":{type:"cardio",name:"Długi marsz / Zone 2",icon:"🚶",detail:"można rodzinnie",extraMin:15},
     "0":{type:"rest",name:"Regeneracja",icon:"🧘",detail:"spacer z psami · mobilność · rozciąganie"}
    }}
 ]};
let PLANDATA=DEFAULT_PLAN;
let view='today';                        // 'today' | 'progress' — przełącznik u góry

// Override auto-progresji faz (localStorage): {activePhase, starts:{ "<id>":"YYYY-MM-DD" }}
function planOverride(){ return load('plan-override-v1', null); }
function activePhase(){
  const p=(PLANDATA&&PLANDATA.phases)||[];
  const ov=planOverride();
  const id=(ov&&ov.activePhase!=null)?ov.activePhase:PLANDATA.activePhase;
  return p.find(x=>x.id===id)||p[0]||null;
}
function fuelTargets(){
  const ph=activePhase();
  const n=ph&&ph.nutrition;
  if(!n) return null;
  return {proteinG:n.proteinG, kcalTarget:n.kcalTarget, kcalFloor:n.kcalFloor};
}
function bodyTargets(){
  const ph=activePhase();
  const b=ph&&ph.body;
  if(!b) return null;
  return {waistCm:b.waistCm, bodyFatPct:b.bodyFatPct};
}
function phaseStart(ph){
  const ov=planOverride();
  return (ov&&ov.starts&&ov.starts[ph.id]) || (ph&&ph.startDate) || null;
}
function phaseWeek(ph){
  const sd=phaseStart(ph);
  if(!ph||!sd) return 1;
  const s=new Date(sd+"T00:00:00");
  if(isNaN(s)) return 1;
  const w=Math.floor((Date.now()-s.getTime())/(7*86400000))+1;
  return Math.max(1, Math.min(w, ph.weeks||99));
}
function cardioMin(ph, wk, day){
  const c=(ph&&ph.cardio)||{}; let m=(c.baseMin||35);
  if(c.stepMin&&c.everyWeeks) m+=c.stepMin*Math.floor((wk-1)/c.everyWeeks);
  if(c.capMin) m=Math.min(m,c.capMin);
  if(day&&day.extraMin) m+=day.extraMin;
  return m;
}
function buildSession(ph, wk, dow){
  const day=(ph&&ph.days&&ph.days[String(dow)]) || {type:"rest",name:"Regeneracja",icon:"🧘",detail:"mobilność · rozciąganie"};
  const s={kind:day.type, name:day.name, icon:day.icon||"•", detail:day.detail||"", exercises:day.exercises||null};
  if(day.type==="cardio"){
    const m=cardioMin(ph,wk,day), zone=(ph&&ph.cardio&&ph.cardio.zone)||"";
    s.durationMin=m;
    s.detail=(day.detail?day.detail+" · ":"")+m+" min"+(zone?" · "+zone:"");
  }
  return s;
}

// ===== Silnik Dnia: readiness 0–100 z wielu sygnalow Garmina =====
// Progi wspoldzielone z przyszlym plan.py: zielony >=67, zolty >=45, ponizej czerwony.
function clampv(x,a,b){ return Math.max(a,Math.min(b,x)); }
// mapuje x z [x0,x1] na [y0,y1] z obcieciem do zakresu wyjsciowego
function lerp(x,x0,x1,y0,y1){ if(x1===x0) return y0; return clampv(y0+(y1-y0)*(x-x0)/(x1-x0), Math.min(y0,y1), Math.max(y0,y1)); }
function lastRow(rows){ return rows[rows.length-1]||{}; }
// srednia z ostatnich n dni Z WYLACZENIEM dzisiaj (baza odniesienia)
function baseField(rows, field, n){
  const a=rows.slice(0,-1).map(r=>r[field]).filter(x=>x!=null&&!isNaN(x)).slice(-n);
  return a.length?a.reduce((s,x)=>s+x,0)/a.length:null;
}
// Kazdy sygnal -> pod-wynik 0..100 + waga. Wynik dnia to srednia wazona.
function readiness(rows){
  const r=lastRow(rows);
  const F=[];
  const hrvBase=baseField(rows,"hrv",14), rhrBase=baseField(rows,"rhr",14);
  if(r.gotowosc!=null) F.push({key:"gotowosc",label:"Gotowość",score:clampv(r.gotowosc,0,100),note:Math.round(r.gotowosc),weight:3});
  if(r.hrv!=null&&hrvBase) F.push({key:"hrv",label:"HRV",score:lerp(r.hrv/hrvBase,0.80,1.10,25,92),note:Math.round(r.hrv)+" ms",weight:2});
  else if(r.hrv!=null) F.push({key:"hrv",label:"HRV",score:60,note:Math.round(r.hrv)+" ms",weight:1});
  if(r.rhr!=null&&rhrBase) F.push({key:"rhr",label:"Tętno sp.",score:lerp(r.rhr-rhrBase,8,-2,30,90),note:Math.round(r.rhr)+" bpm",weight:1.5});
  if(r.sen!=null) F.push({key:"sen",label:"Sen",score:lerp(r.sen,4.5,7.8,25,92),note:r.sen+" h",weight:1.5});
  if(r.bb_max!=null) F.push({key:"bodybattery",label:"Body Battery",score:clampv(r.bb_max,0,100),note:Math.round(r.bb_max),weight:1});
  if(r.stres!=null) F.push({key:"stres",label:"Stres",score:clampv(100-r.stres,0,100),note:Math.round(r.stres),weight:1});
  if(r.recovery_h!=null) F.push({key:"recovery",label:"Do regen.",score:lerp(r.recovery_h,0,36,92,30),note:Math.round(r.recovery_h)+" h",weight:1});
  if(!F.length) return {score:null,zone:"none",factors:[],hasData:false};
  const wsum=F.reduce((s,f)=>s+f.weight,0);
  let score=F.reduce((s,f)=>s+f.score*f.weight,0)/wsum;
  const st=(r.status||"").toUpperCase();
  if(st==="POOR") score-=8; else if(st==="LOW"||st==="UNBALANCED") score-=4;
  score=Math.round(clampv(score,0,100));
  const zone = score>=67?"green" : score>=45?"yellow" : "red";
  return {score,zone,factors:F,status:st,hasData:true};
}

// Decyzja dnia: laczy readiness + plan + histori w JEDEN focus.
function dailyFocus(ph, wk, dow, rows){
  const base=buildSession(ph, wk, dow);
  const rd=readiness(rows);
  const REST={kind:"rest",name:"Regeneracja aktywna",icon:"🧘",detail:"spacer · mobilność · rozciąganie · oddech",exercises:null};
  const Z2={kind:"cardio",name:"Zone 2 — spokojnie",icon:"🚴",detail:"30–35 min · tętno 125–140 · oddech nosem",exercises:null};
  let session=base;
  if(rd.hasData){
    if(rd.zone==="red"){ if(base.kind!=="rest") session=REST; }
    else if(rd.zone==="yellow"){
      if(base.kind==="strength") session=Z2;
      else if(base.kind==="cardio") session={...base,detail:(base.detail?base.detail+" · ":"")+"dziś krócej"};
    }
  }
  const swapped = session.name!==base.name;
  let title, intensityL, intensityT;
  if(session.kind==="rest"){ title="Regeneracja"; intensityL="Bardzo lekko"; intensityT="spacer, mobilność, oddech nosem — zero obciążenia"; }
  else if(session.kind==="strength"){
    if(rd.zone==="green"){ title="Siła — dociśnij"; intensityL="RPE 8"; intensityT="zostaw ~2 powt. w zapasie, ostatnia seria mocna"; }
    else { title="Siła — technika"; intensityL="RPE 7"; intensityT="pełen zakres ruchu, spokojne tempo"; }
  } else {
    const zoneTxt=(ph&&ph.cardio&&ph.cardio.zone)||"tętno 125–140 · oddech nosem";
    title = swapped ? "Tlen zamiast siły" : (rd.zone==="yellow" ? "Zone 2 — krócej" : "Zone 2 — równo");
    intensityL="Zone 2"; intensityT=zoneTxt;
  }
  let why;
  if(!rd.hasData){ why="Brak danych regeneracji — trzymamy plan bazowy. Odśwież dane z Garmina."; }
  else {
    const sorted=[...rd.factors].sort((a,b)=>a.score-b.score);
    if(rd.zone==="green"){
      const top=sorted.slice(-2).reverse().map(f=>f.label.toLowerCase()+" "+f.note);
      why="Masz zapas — "+top.join(", ")+". Dziś możesz zainwestować.";
    } else {
      const low=sorted.slice(0,2).map(f=>f.label.toLowerCase()+" "+f.note);
      const tail=rd.zone==="red"?"dziś regeneracja, nie obciążaj":"zejdź z intensywności";
      why=low.join(", ")+" → "+tail+".";
    }
  }
  return {ready:rd, session, base, swapped, planName:base.name, title, why, intensityL, intensityT};
}

function ring(score, zone){
  const col={green:"#10b981",yellow:"#fbbf24",red:"#ef4444"}[zone]||"#6a6a6a";

  return `<svg viewBox="0 0 80 80" style="width:82px;height:82px">
    <circle cx="40" cy="40" r="${rr}" fill="none" stroke="#232323" stroke-width="7"/>
    <circle cx="40" cy="40" r="${rr}" fill="none" stroke="${col}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 40 40)"/>
    <text x="40" y="41" text-anchor="middle" dominant-baseline="central" fill="${col}"
      font-size="24" font-weight="700" font-family="ui-monospace,monospace">${score!=null?score:"–"}</text>
  </svg>`;
}

// ===== Progresja siły: historia per cwiczenie + inteligentna sugestia obciazenia =====
function fmt(x){ return (Math.round(x*10)/10).toString().replace(".",","); }
function exHist(id){ return (log.exHist&&log.exHist[id])||[]; }
// jednorazowa migracja starego log.ex {kg,d} -> log.exHist [{kg,d}]
function migrateStrength(){
  if(log.exHist) return;
  log.exHist={};
  if(log.ex) for(const id in log.ex){ const e=log.ex[id]; if(e&&e.kg!=null) log.exHist[id]=[{kg:e.kg,d:e.d||""}]; }
  save("fit-log-v1",log);
}
function pushWeight(id,kg,tk){
  if(!log.exHist) log.exHist={};
  const h=log.exHist[id]||(log.exHist[id]=[]);
  const last=h[h.length-1];
  if(last&&last.d===tk) last.kg=kg;          // ten sam dzien -> nadpisz
  else h.push({kg,d:tk});
  if(h.length>12) h.splice(0,h.length-12);    // trzymamy ostatnie 12 wpisow
  save("fit-log-v1",log);
}
// zawias biodrowy / duze partie -> wieksze skoki, gora ciala -> mniejsze
function isLower(id){ return /squat|rdl|deadlift|lunge|hip|leg|farmer|przysiad|martwy|wykrok/i.test(id); }
function nextTarget(id){
  const h=exHist(id); if(!h.length) return null;
  const last=h[h.length-1].kg, prev=h.length>=2?h[h.length-2].kg:null;
  const inc=isLower(id)?5:2.5;
  if(prev!=null && Math.abs(last-prev)<0.01) return {txt:"➜ spróbuj "+fmt(last+inc)+" kg"};   // 2 sesje ten sam ciezar -> dolóż
  if(prev!=null && last>prev) return {txt:"utrzymaj "+fmt(last)+" kg"};                          // swiezy wzrost -> ugruntuj
  return null;
}
function exRow(ex, tk){
  const h=exHist(ex.id), last=h.length?h[h.length-1]:null;
  const phv=last?fmt(last.kg):"";
  const nt=nextTarget(ex.id);
  const histTxt = h.length
    ? h.slice(-3).map(e=>fmt(e.kg)).join(" → ")+" kg"+(nt?` · <span class="chip">${nt.txt}</span>`:"")
    : "";
  return `<div class="ex">
    <div style="flex:1;min-width:0">
      <div class="exn">${ex.name}</div>
      <div class="exs">${ex.scheme}${ex.note?" · "+ex.note:""}</div>
      ${histTxt?`<div class="exhist">${histTxt}</div>`:""}
    </div>
    <div class="exw">
      <input type="text" inputmode="decimal" data-ex="${ex.id}" placeholder="${phv||"kg"}" />
      <div class="last">${last?"ost. "+fmt(last.kg)+" kg":"zapisz ciężar"}</div>
    </div></div>`;
}

function load(k,def){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):def;}catch(e){return def;} }
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function key(d){d=new Date(d);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function monday(d){d=new Date(d);const k=(d.getDay()+6)%7;d.setDate(d.getDate()-k);d.setHours(0,0,0,0);return d;}
function nz(a){return a.filter(x=>x!=null&&!isNaN(x));}
function mean(a){a=nz(a);return a.length?a.reduce((s,x)=>s+x,0)/a.length:null;}
function r1(x){return x==null?"—":Math.round(x*10)/10;}

function mergedWeights(){
  const m={};
  if(gar&&gar.rows){gar.rows.forEach(r=>{if(r.waga)m[r.data]=r.waga;});}
  Object.entries(log.weights).forEach(([k,v])=>{m[k]=v;}); // ręczne nadpisują
  return Object.entries(m).map(([k,v])=>({k,v})).sort((a,b)=>a.k<b.k?-1:1);
}

function spark(vals, color){
  vals=nz(vals);
  if(vals.length<2) return '<div class="sub">Za mało danych na wykres.</div>';
  const w=300,h=64,p=8, mn=Math.min(...vals),mx=Math.max(...vals),sp=(mx-mn)||1;
  const pts=vals.map((v,i)=>[p+i*(w-2*p)/(vals.length-1), p+(h-2*p)*(1-(v-mn)/sp)]);
  const line=pts.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+","+q[1].toFixed(1)).join(" ");
  const area=line+" L"+pts[pts.length-1][0].toFixed(1)+","+(h-p)+" L"+pts[0][0].toFixed(1)+","+(h-p)+" Z";
  const last=pts[pts.length-1];
  const id="g"+Math.random().toString(36).slice(2,7);
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:64px">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${id})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${color}"/></svg>`;
}

function garminCard(){
  if(!gar||!gar.rows||!gar.rows.length) return "";
  const rows=gar.rows;
  const hrv=rows.map(r=>r.hrv), rhr=rows.map(r=>r.rhr), sen=rows.map(r=>r.sen), kr=rows.map(r=>r.kroki);
  const last=(a)=>{for(let i=a.length-1;i>=0;i--)if(a[i]!=null&&!isNaN(a[i]))return a[i];return null;};
  const tail=(a,n)=>nz(a).slice(-n);
  const hrv7=mean(tail(hrv,7)), hrvPrev=mean(nz(hrv).slice(-14,-7));
  const rhr7=mean(tail(rhr,7)), rhrPrev=mean(nz(rhr).slice(-14,-7));
  const sen7=mean(tail(sen,7)), steps7=mean(tail(kr,7));
  const senArr=tail(sen,14), senStd=senArr.length>1?Math.sqrt(mean(senArr.map(x=>Math.pow(x-mean(senArr),2)))):null;
  const status=(function(){for(let i=rows.length-1;i>=0;i--)if(rows[i].status)return rows[i].status;return "";})();
  const hrvTrend = (hrv7!=null&&hrvPrev!=null)? hrv7-hrvPrev : null;
  const rhrTrend = (rhr7!=null&&rhrPrev!=null)? rhr7-rhrPrev : null;
  const lastOf=(k)=>{for(let i=rows.length-1;i>=0;i--){const v=rows[i][k]; if(v!=null&&v!==""&&!isNaN(v))return +v;}return null;};
  const spo2=lastOf("spo2"), spo2min=lastOf("spo2_min"), tnoc=lastOf("temp_noc");
  const bb=lastOf("bb_max"), stres=lastOf("stres");
  const arr=(v,goodUp)=> v==null?"":(Math.abs(v)<0.3?"":`<span class="arrow ${ (v>0)===goodUp ?"up":"down"}">${v>0?"▲":"▼"}${Math.abs(v).toFixed(1)}</span>`);
  const statusPL={BALANCED:"zrównoważone",UNBALANCED:"niezrównoważone",LOW:"niskie",POOR:"słabe"}[status]||status||"—";
  return `<div class="card">
    <p class="label">Regeneracja (z Garmina)</p>
    <div class="metrics">
      <div class="m" data-info="hrv"><div class="mv mono">${r1(hrv7)}<span style="font-size:13px;color:var(--mut)"> ms</span>${arr(hrvTrend,true)}</div><div class="ml">HRV nocne (śr. 7 dni)${ic()}</div></div>
      <div class="m" data-info="rhr"><div class="mv mono">${r1(rhr7)}<span style="font-size:13px;color:var(--mut)"> bpm</span>${arr(rhrTrend,false)}</div><div class="ml">Tętno spoczynkowe${ic()}</div></div>
      <div class="m" data-info="sen"><div class="mv mono">${r1(sen7)}<span style="font-size:13px;color:var(--mut)"> h</span></div><div class="ml">Sen (śr. 7 dni)${senStd!=null?` · ±${r1(senStd)}h`:""}${ic()}</div></div>
      <div class="m" data-info="steps"><div class="mv mono">${steps7!=null?Math.round(steps7).toLocaleString("pl-PL"):"—"}</div><div class="ml">Kroki (śr. 7 dni)${ic()}</div></div>
      ${bb!=null?`<div class="m" data-info="bodybattery"><div class="mv mono">${Math.round(bb)}</div><div class="ml">Body Battery (szczyt)${ic()}</div></div>`:""}
      ${stres!=null?`<div class="m" data-info="stres"><div class="mv mono">${Math.round(stres)}</div><div class="ml">Stres (śr. dzień)${ic()}</div></div>`:""}
      ${spo2!=null?`<div class="m" data-info="spo2"><div class="mv mono">${r1(spo2)}<span style="font-size:13px;color:var(--mut)">%</span></div><div class="ml">SpO₂ we śnie${spo2min!=null?` · min ${r1(spo2min)}`:""}${ic()}</div></div>`:""}
      ${tnoc!=null?`<div class="m" data-info="tempnoc"><div class="mv mono">${r1(tnoc)}<span style="font-size:13px;color:var(--mut)">°C</span></div><div class="ml">Temp. w nocy${ic()}</div></div>`:""}
    </div>
    <div style="margin-top:14px"><p class="label" style="margin-bottom:6px">HRV — 30 dni</p>${spark(nz(hrv).slice(-30),"#10b981")}</div>
    <div class="sub">Status HRV: <b style="color:var(--tx)">${statusPL}</b></div>
    <div class="stamp">${gar.source==="auto"?"Auto-aktualizacja":"Import"}: ${gar.importedAt? new Date(gar.importedAt).toLocaleString("pl-PL"):"—"} · ${rows.length} dni</div>
  </div>`;
}

 readiness:{t:"Gotowość dnia (0–100)",h:`<p>Jeden wskaźnik łączący Twoje nocne sygnały z Garmina: gotowość treningową, HRV względem Twojej bazy, tętno spoczynkowe, sen, Body Battery, stres i czas do regeneracji. Każdy sygnał ma swoją wagę.</p><p><span class="t">67–100</span> zielony — możesz inwestować (siła, akcenty). <span class="t">45–66</span> żółty — trzymaj lekko. <span class="t">0–44</span> czerwony — dziś regeneracja.</p><p>To nie ocena Ciebie — to informacja, ile organizm dziś udźwignie bez cofania progresu.</p>`},

 rhr:{t:"Tętno spoczynkowe",h:`<p>Ile uderzeń na minutę robi serce w pełnym spoczynku. Niższe zwykle znaczy lepszą kondycję i lepsze wypoczęcie.</p><p>Nagły wzrost o 5–7 uderzeń ponad bazę = niedospanie, stres lub nadchodząca choroba — dobry powód na lżejszy dzień.</p><p class="t">Kierunek: w dół wraz z poprawą kondycji.</p>`},
 sen:{t:"Sen",h:`<p>Fundament regeneracji, gospodarki hormonalnej i apetytu. Za mało snu = większy głód, gorsze decyzje żywieniowe i słabszy trening.</p><p>Ważna jest nie tylko długość, ale <b>stałość pór</b>. Kładzenie się o podobnej godzinie stabilizuje HRV i Body Battery.</p><p class="t">Cel: 7–8 h, w łóżku przed 22:00.</p>`},
 bodybattery:{t:"Body Battery",h:`<p>Szacunek Garmina Twojej „baterii" energii (0–100) na bazie HRV, stresu, snu i aktywności. Rośnie w odpoczynku, spada przy wysiłku i stresie.</p><p>Wysoki poranny poziom = dobry moment na mocniejszy trening. Niski = priorytet regeneracja.</p>`},
 stres:{t:"Stres (Garmin)",h:`<p>Wskaźnik 0–100 z analizy HRV w ciągu dnia. Wyższy = dłuższa aktywacja „walcz lub uciekaj" (praca, kawa, niedospanie).</p><p>Przewlekle wysoki stres blokuje regenerację i spalanie tłuszczu. Oddech nosem, spacery i sen go obniżają.</p>`},
 recovery:{t:"Czas do regeneracji",h:`<p>Ile godzin Garmin sugeruje do pełnego wypoczęcia po ostatnim wysiłku. Wysoka wartość rano = ciało jeszcze pracuje nad naprawą.</p><p>Trening na dużym „długu" regeneracyjnym daje słabszy efekt i większe ryzyko kontuzji.</p>`},
 gotowosc:{t:"Gotowość treningowa (Garmin)",h:`<p>Ocena Garmina 0–100, jak bardzo jesteś gotów na wysiłek — łączy sen, HRV, obciążenie i czas regeneracji. To najsilniejszy pojedynczy sygnał w naszym liczniku dnia.</p>`},
 vo2max:{t:"VO₂max",h:`<p>Maksymalny pobór tlenu — miara mocy silnika tlenowego i jeden z najlepszych pojedynczych predyktorów zdrowia i długowieczności.</p><p>Rośnie od regularnej Zone 2 i okazjonalnych akcentów tempowych. Zmiany są powolne — patrz na trend miesięczny.</p><p class="t">Cel: 40.</p>`},
 trainingload:{t:"Obciążenie treningowe",h:`<p>Suma wysiłku z ostatnich dni (Garmin, ~7-dniowe). Pokazuje, ile pracy włożyłeś — samo w sobie nie mówi, czy to za dużo. Od tego jest wskaźnik ryzyka poniżej.</p>`},
 acwr:{t:"Ryzyko przetrenowania (ostre : przewlekłe)",h:`<p>Stosunek objętości z <b>ostatnich 7 dni</b> do Twojej średniej tygodniowej z <b>28 dni</b>. Mówi, czy nie rozpędzasz się za szybko.</p><p><span class="t">0,8–1,3</span> słodki punkt — bezpieczny wzrost formy. <span class="t">powyżej 1,5</span> skok objętości = ryzyko kontuzji i przetrenowania. <span class="t">poniżej 0,8</span> tracisz formę, można dołożyć.</p><p>Zasada: zwiększaj objętość o maks. ~10% tygodniowo.</p>`},
 endurance:{t:"Endurance score",h:`<p>Ocena Garmina Twojej wytrzymałości długodystansowej — im więcej regularnej pracy tlenowej, tym wyżej. Uzupełnia VO₂max o wymiar „ile wytrzymasz", nie tylko „jak mocno".</p>`},
 minint:{t:"Minuty intensywne",h:`<p>Minuty w umiarkowanej i wysokiej intensywności (Garmin). WHO zaleca 150+ tygodniowo dla zdrowia. U nas to też miara objętości do liczenia ryzyka przetrenowania.</p><p class="t">Cel: 150+ / tydzień.</p>`},
 steps:{t:"Kroki / NEAT",h:`<p>Codzienna aktywność poza treningiem (NEAT) to często największy, niedoceniany wydatek kalorii w redukcji — i łatwiejszy do utrzymania niż dokładanie ciężkich treningów.</p><p class="t">Cel: 7–8 tys. dziennie.</p>`},
 focus:{t:"Focus dnia i RPE",h:`<p>Aplikacja bierze Twój plan na dziś i dostraja go do gotowości: przy słabym dniu siłownia zamienia się w spokojny tlen lub regenerację, przy dobrym — dostajesz zielone światło, by docisnąć.</p><p><b>RPE</b> to skala odczuwanego wysiłku 1–10. <span class="t">RPE 7</span> = zostają ~3 powtórzenia w zapasie (technika). <span class="t">RPE 8</span> = zostają ~2 (docisk).</p>`},
 strength:{t:"Siła i progresja",h:`<p>Progres to <b>stopniowe przeciążanie</b>: gdy ciężar staje się łatwy (dwie sesje z zapasem), dokładasz trochę. Aplikacja podpowiada +2,5 kg (góra ciała) lub +5 kg (dół).</p><p>Siła w redukcji chroni mięśnie — schodzisz z wagi, ale zostajesz silny i utrzymujesz metabolizm.</p>`},
 zone2:{t:"Zone 2 — baza tlenowa",h:`<p>Spokojny wysiłek, przy którym dasz radę mówić pełnymi zdaniami (tętno ~125–140, oddech nosem). Buduje mitochondria i zdolność spalania tłuszczu.</p><p>Nuda jest celem — to ma być łatwe. Objętość rośnie stopniowo z tygodniami.</p>`},
 bialko:{t:"Białko — paliwo mięśni",h:`<p>W redukcji białko chroni mięśnie. Cel fazy: <b>ok. 2 g na kg wagi docelowej</b> (≈180 g przy 90 kg).</p><p>Liczy się <b>7-dniowa średnia</b>, nie pojedynczy dzień.</p><p class="t">Dane z Fitatu — zaloguj posiłki tam jak zwykle.</p>`},
 kcal:{t:"Energia i deficyt",h:`<p>Umiarkowany deficyt (~300–600 kcal) sprzyja utracie tłuszczu przy zachowaniu mięśni.</p><p>Za duży deficyt = ryzyko utraty mięśni. Nie schodź poniżej <b>podłogi kalorycznej</b> z planu.</p>`},
 rest:{t:"Regeneracja aktywna",h:`<p>Dzień na odbudowę: spacer, mobilność, rozciąganie, oddech. Postęp dzieje się <b>między</b> treningami — bez regeneracji nie ma adaptacji.</p>`},
 phase:{t:"Fazy planu",h:`<p>Plan idzie etapami: najpierw baza tlenowa i wzorce ruchu, potem rozbudowa (akcenty tempowe, cięższa siła). Gdy faza dobiega końca, aplikacja proponuje przejście dalej — jednym dotknięciem.</p>`},
 priorities:{t:"Priorytety tygodnia",h:`<p>Na podstawie Twoich trendów aplikacja wybiera 1–3 rzeczy, które w tym tygodniu dadzą najwięcej — czy to sen, kroki, objętość, czy odpuszczenie. Skup się na nich, resztę po prostu trzymaj.</p>`},
 tghdl:{t:"TG / HDL",h:`<p>Trójglicerydy podzielone przez „dobry" cholesterol HDL — prosty, mocny wskaźnik zdrowia metabolicznego i insulinowrażliwości.</p><p>Spada od redukcji tłuszczu, ruchu i ograniczenia cukrów prostych. Wpisz wyniki z badań krwi, by śledzić.</p><p class="t">Cel: poniżej 3 (idealnie poniżej 2).</p>`},
 weight:{t:"Waga i tempo",h:`<p>Patrz na <b>trend</b>, nie na pojedynczy dzień — waga skacze od wody, soli i jedzenia. Zdrowe tempo w redukcji to ok. 0,5–1% masy ciała na tydzień.</p><p>Zbyt szybko = tracisz mięśnie i HRV. Wolno i stabilnie wygrywa.</p>`},
 spo2:{t:"SpO₂ we śnie",h:`<p>Wysycenie krwi tlenem w nocy. Zdrowe wartości to zwykle 94–99%. Regularnie niskie minima mogą sugerować gorszą jakość oddechu we śnie — warto obserwować.</p>`},
 tempnoc:{t:"Temperatura w nocy",h:`<p>Nocne minimum w Twojej okolicy (z danych pogodowych). Ciepłe noce potrafią pogarszać sen i podnosić tętno spoczynkowe — to kontekst do interpretacji regeneracji.</p>`},
 talia:{t:"Obwód talii",h:`<p>Najtańszy wiarygodny wskaźnik utraty tłuszczu. Mierz na wysokości pępka, na luźnym wydechu, taśma przylega ale nie wciska. Zawsze o tej samej porze (rano).</p><p>Liczy się <b>trend tygodniowy</b>, nie pojedynczy pomiar. Talia w dół + waga ~stała + ciężary w górę = rekompozycja działa.</p><p class="t">Cel końcowy: ok. 94 cm.</p>`},
 bodyfat:{t:"Skład ciała (z wagi)",h:`<p>Procent tłuszczu i masa mięśni pojawiają się tu automatycznie, jeśli używasz wagi Garmin Index. Bez niej ta sekcja jest ukryta — talia i tak odpowiada na pytanie o rekompozycję.</p>`},
 sylwetka:{t:"Obwody ciała",h:`<p>Talia, kark, biodra, ramię, udo. Mierzone co tydzień. <b>Talia spada, a ramię/udo trzymają</b> = tłuszcz schodzi, mięśnie zostają. Wpisuj rano, w tych samych warunkach.</p>`}
};

let _sheetOpen=false;
function showSheet(key){
  const info=INFO[key]; if(!info||_sheetOpen) return;
  _sheetOpen=true;
  const el=document.createElement("div"); el.className="sheet";
  el.innerHTML=`<div class="sheet-card"><div class="grip"></div><h3>${info.t}</h3>
    <div class="sbody">${info.h}</div><button class="close">Rozumiem</button></div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add("on"));
  const close=()=>{ el.classList.remove("on"); _sheetOpen=false; setTimeout(()=>el.remove(),220); };
  el.addEventListener("click",(e)=>{ if(e.target===el || e.target.classList.contains("close")) close(); });
}

// ===== Ryzyko przetrenowania: ostre (7 dni) : przewlekłe (śr. tyg. z 28 dni) =====
function acwrData(rows){
  const load=rows.map(r=> (r.min_intensywne!=null&&!isNaN(r.min_intensywne))? r.min_intensywne : 0);
  const present=rows.slice(-28).filter(r=> r.min_intensywne!=null&&!isNaN(r.min_intensywne)).length;
  if(rows.length<21 || present<10) return null;              // za mało danych na sensowny wskaźnik
  const sum=(a)=>a.reduce((s,x)=>s+x,0);
  const acute=sum(load.slice(-7));
  const chronic=sum(load.slice(-28))/4;
  if(chronic<=0) return acute>0 ? {ratio:null,acute,chronic:0,zone:"ramp",label:"Rozpęd"} : null;
  const ratio=acute/chronic;
  let zone,label;
  if(ratio<0.8){ zone="low"; label="Niedociążenie"; }
  else if(ratio<=1.3){ zone="opt"; label="Optymalnie"; }
  else if(ratio<=1.5){ zone="watch"; label="Uwaga"; }
  else { zone="high"; label="Wysokie ryzyko"; }
  return {ratio,acute,chronic,zone,label};
}
function acwrCard(){
  if(!gar||!gar.rows) return "";
  const a=acwrData(gar.rows); if(!a) return "";
  const col={low:"#8a8a8a",opt:"#10b981",watch:"#f59e0b",high:"#ef4444",ramp:"#6366f1"}[a.zone]||"#8a8a8a";
  const ratioTxt=a.ratio!=null ? a.ratio.toFixed(2).replace(".",",") : "—";
  const sweetL=0.8/2*100, sweetW=(1.3-0.8)/2*100;
  const markPos=a.ratio!=null ? Math.min(100, a.ratio/2*100) : 0;
  return `<div class="card" data-info="acwr">
    <p class="label">Ryzyko przetrenowania${ic()}</p>
    <div class="acwr-top">
      <div class="acwr-v mono" style="color:${col}">${ratioTxt}</div>
      <div class="acwr-lab" style="background:${col}22;color:${col}">${a.label}</div>
    </div>
    <div class="acwr-bar"><div class="acwr-sweet" style="left:${sweetL}%;width:${sweetW}%"></div>
      ${a.ratio!=null?`<div class="acwr-mark" style="left:calc(${markPos}% - 1.5px)"></div>`:""}</div>
    <div class="acwr-sc"><span>0,8</span><span>słodki punkt</span><span>1,5+</span></div>
    <div class="sub" style="margin-top:11px">Ostatnie 7 dni: <b style="color:var(--tx)">${Math.round(a.acute)} min</b> · baza tygodniowa: ${Math.round(a.chronic)} min</div>
  </div>`;
}

// ===== Priorytety tygodnia: 1–3 rzeczy o największym zwrocie, z Twoich trendów =====
function priorities(rows){
  const nzslice=(k,n)=>rows.map(r=>r[k]).filter(x=>x!=null&&!isNaN(x)).slice(-n);
  const avg=(a)=>a.length?a.reduce((s,x)=>s+x,0)/a.length:null;
  const hrvArr=nzslice("hrv",14), hrv7=avg(hrvArr.slice(-7)), hrvPrev=hrvArr.length>7?avg(hrvArr.slice(0,hrvArr.length-7)):null;
  const hrvTrend=(hrv7!=null&&hrvPrev!=null)?hrv7-hrvPrev:null;
  const steps7=avg(nzslice("kroki",7));
  const senArr=nzslice("sen",14), sen7=avg(senArr.slice(-7));
  const senStd=senArr.length>2?Math.sqrt(avg(senArr.map(x=>Math.pow(x-avg(senArr),2)))):null;
  let status=""; for(let i=rows.length-1;i>=0;i--){ if(rows[i].status){ status=(rows[i].status||"").toUpperCase(); break; } }
  const a=acwrData(rows);
  const vo2=nzslice("vo2max",60), vo2Trend=vo2.length>10?vo2[vo2.length-1]-vo2[0]:null;
  const C=[];
  if(status==="POOR"||status==="LOW"||(hrvTrend!=null&&hrvTrend<-3))
    C.push({key:"recovery",icon:"🛌",title:"Regeneracja na pierwszym miejscu",note:"HRV pod kreską — więcej snu, mniej intensywności.",weight:9});
  if(a&&a.zone==="high")
    C.push({key:"acwr",icon:"⚠️",title:"Zejdź z objętości",note:"Ostry skok obciążenia — ryzyko przetrenowania. Utrzymaj, nie dokładaj.",weight:8.5});
  if((senStd!=null&&senStd>1.2)||(sen7!=null&&sen7<6.5))
    C.push({key:"sen",icon:"😴",title:"Ustabilizuj sen",note:"Stałe pory snu podbiją HRV i regenerację szybciej niż cokolwiek innego.",weight:7.5});
  if(steps7!=null&&steps7<7000)
    C.push({key:"steps",icon:"🚶",title:"Dobij kroki (NEAT)",note:`Średnio ${Math.round(steps7/100)/10}k/dzień — celuj w 7–8k, to spory wydatek kalorii.`,weight:7});
  if(a&&a.zone==="low")
    C.push({key:"acwr",icon:"📈",title:"Można dołożyć objętości",note:"Masz zapas — bezpiecznie dorzuć jeden trening tlenowy w tym tygodniu.",weight:5.5});
  if(vo2Trend!=null&&vo2Trend<=0)
    C.push({key:"vo2max",icon:"🫁",title:"Rusz VO₂max",note:"Trend płaski — trzymaj Zone 2 i raz w tygodniu krótki akcent tempowy.",weight:5});
  C.push({key:"strength",icon:"💪",title:"Nie odpuszczaj siły",note:"2 sesje w tygodniu chronią mięśnie w redukcji. Progresuj powoli.",weight:4});
  C.push({key:"weight",icon:"⚖️",title:"Trzymaj stabilne tempo",note:"0,5–1% masy na tydzień. Patrz na trend, nie na pojedynczy dzień.",weight:3});
  const _tg=fuelTargets();
  if(_tg){
    const prot7=mean(rows.map(r=>r.bialko).filter(x=>x!=null&&!isNaN(x)).slice(-7));
    if(prot7!=null && prot7 < _tg.proteinG*0.85)
      C.push({key:"protein",icon:"🥩",title:"Dobij białko",note:`Śr. 7 dni ${Math.round(prot7)} g < cel ${_tg.proteinG} g — białko chroni mięśnie w redukcji.`,weight:7});
    const kcal3=rows.slice(-3).map(r=>r.kcal_spozyte);
    if(kcal3.length===3 && kcal3.every(v=>v!=null&&!isNaN(v)&&v<_tg.kcalFloor))
      C.push({key:"deficit",icon:"⚠️",title:"Za duży deficyt",note:`3 dni poniżej ${_tg.kcalFloor} kcal — chronisz mięśnie, dodaj jedzenia.`,weight:8});
  }
  const _bt=bodyTargets();
  const _ws=circSeries("waist");
  if(_ws.length){
    // stale measurement: last waist entry older than 14 days
    const lastD=_ws[_ws.length-1].d;
    const ageDays=Math.round((Date.parse(new Date().toISOString().slice(0,10))-Date.parse(lastD))/86400000);
    if(ageDays>=14)
      C.push({key:"measure",icon:"📏",title:"Zmierz talię",note:`Ostatni pomiar ${ageDays} dni temu — cotygodniowy obwód talii to Twój licznik tłuszczu.`,weight:6});
  } else {
    C.push({key:"measure",icon:"📏",title:"Zacznij mierzyć talię",note:"Cotygodniowy obwód talii pokazuje, czy tłuszcz schodzi, gdy waga stoi.",weight:6});
  }
  if(_ws.length>=4){
    // recomp confirmation: waist down over last ~4 entries while weight ~flat over ~28 days
    const wNow=_ws[_ws.length-1].v, wRef=_ws[_ws.length-4].v;
    const mw=(typeof mergedWeights==="function")?mergedWeights():[];
    const kgNow=mw.length?mw[mw.length-1].v:null;
    const kgRef=mw.length>=28?mw[mw.length-28].v:(mw.length?mw[0].v:null);
    const waistDown=(wNow!=null&&wRef!=null&&wNow<wRef-0.4);
    const weightFlat=(kgNow!=null&&kgRef!=null&&Math.abs(kgNow-kgRef)<=1.0);
    if(waistDown&&weightFlat)
      C.push({key:"recomp",icon:"✅",title:"Rekompozycja działa",note:"Talia spada przy ~stałej wadze — tłuszcz schodzi, mięśnie zostają. Tak trzymaj.",weight:3});
    // waist plateau vs target
    if(_bt&&_bt.waistCm&&!waistDown && wNow!=null && wNow>_bt.waistCm)
      C.push({key:"waistplateau",icon:"📉",title:"Talia stoi",note:`Obwód talii nie spada i jest powyżej celu ${_bt.waistCm} cm — sprawdź deficyt i kroki.`,weight:5});
  }
  C.sort((x,y)=>y.weight-x.weight);
  const seen=new Set(), out=[]; for(const c of C){ if(seen.has(c.key))continue; seen.add(c.key); out.push(c); if(out.length>=3)break; }
  return out;
}
function prioritiesCard(){
  if(!gar||!gar.rows||gar.rows.length<3) return "";
  const ps=priorities(gar.rows); if(!ps.length) return "";
  return `<div class="card">
    <p class="label">W tym tygodniu — priorytety${ib('priorities')}</p>
    ${ps.map((p,i)=>`<div class="prio" data-info="${p.key}"><div class="pic">${p.icon}</div>
      <div style="flex:1;min-width:0"><div class="pt">${p.title}${ic()}</div><div class="pn">${p.note}</div></div>
      <div class="rank">#${i+1}</div></div>`).join("")}
  </div>`;
}

// ===== Auto-progresja faz: wykrycie końca + jedno kliknięcie do następnej =====
function nextPhase(ph){ const p=(PLANDATA&&PLANDATA.phases)||[]; return ph?p.find(x=>x.id===ph.id+1)||null:null; }
function phaseTransitionCard(ph, wk){
  const np=nextPhase(ph); if(!np) return "";
  if(wk < (ph.weeks||99)) return "";                          // faza jeszcze trwa
  return `<div class="card phase-card">
    <p class="label" style="color:var(--amber-l)">Koniec fazy${ib('phase')}</p>
    <div class="focus-t" style="margin-top:6px">${ph.subtitle} zaliczona 🎉</div>
    <div class="focus-w" style="margin-top:6px">Tydzień ${wk}/${ph.weeks}. Czas na <b style="color:var(--tx)">${np.subtitle}: ${np.name}</b>.</div>
    <button class="act done" id="nextPhaseBtn">Rozpocznij ${np.subtitle}: ${np.name}</button>
  </div>`;
}

// ===== Widok Postępy =====
function exNameMap(){
  const m={};
  ((PLANDATA&&PLANDATA.phases)||[]).forEach(ph=>{
    Object.values(ph.days||{}).forEach(d=>{ (d.exercises||[]).forEach(e=>{ if(e.id&&!m[e.id]) m[e.id]=e.name; }); });
  });
  return m;
}
function weeklyAgg(rows){
  const byWeek={};
  rows.forEach(r=>{ if(!r.data) return; const d=new Date(r.data+"T00:00:00"); if(isNaN(d)) return;
    const k=key(monday(d)); const b=(byWeek[k]=byWeek[k]||{minutes:0,trained:0,protSum:0,protN:0}); b.minutes+=(r.min_intensywne!=null&&!isNaN(r.min_intensywne))?r.min_intensywne:0; if(r.bialko!=null&&!isNaN(r.bialko)){ b.protSum+=r.bialko; b.protN++; } });
  Object.keys(log.days||{}).forEach(dk=>{ if((log.days[dk]||{}).trained){ const d=new Date(dk+"T00:00:00"); if(isNaN(d)) return;
    const k=key(monday(d)); (byWeek[k]=byWeek[k]||{minutes:0,trained:0}).trained += 1; } });
  return Object.keys(byWeek).sort().slice(-8).map(k=>{ const dd=new Date(k+"T00:00:00");

}
function bars(items, color){
  if(!items.length) return '<div class="sub">Za mało danych.</div>';
  const mx=Math.max(1,...items.map(i=>i.v));
  return `<div class="bars">${items.map(i=>`<div class="bar" title="${i.v}">
    <div class="bwrap"><div class="bfill" style="height:${Math.round(i.v/mx*100)}%;background:${color}"></div></div>
    <div class="blab">${i.label}</div></div>`).join("")}</div>`;
}

function parseCSV(text){
  const lines=text.replace(/^\uFEFF/,"").trim().split(/\r?\n/);
  const head=lines[0].split(",").map(h=>h.trim());
  const ix={}; head.forEach((h,i)=>ix[h]=i);
  const g=(c,k)=> ix[k]!=null ? (c[ix[k]]||"").trim() : "";
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(",");
    const data=g(c,"data"); if(!data)continue;
    out.push({
      data,
      waga: parseFloat(g(c,"waga_kg"))||null,
      kroki: parseInt(g(c,"kroki"))||null,
      rhr: parseFloat(g(c,"tetno_spocz"))||null,
      hrv: parseFloat(g(c,"hrv_noc_ms"))||null,
      sen: parseFloat(g(c,"sen_h"))||null,
      status: g(c,"hrv_status")||"",
      gotowosc: parseFloat(g(c,"gotowosc_tren"))||null
    });
  }
  return out.sort((a,b)=>a.data<b.data?-1:1);
}

  }catch(e){ alert("Nie udało się włączyć briefingu: "+((e&&e.message)||e)); }

async function disableBriefing(){
  save("briefing-v1", false);
  try{ const reg=await navigator.serviceWorker.ready; const s=await reg.pushManager.getSubscription(); if(s) await s.unsubscribe(); }catch(e){}
  render();
}

async function deriveAuth(pass){
  const bk=await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveBits"]);
  const bits=await crypto.subtle.deriveBits(
    {name:"PBKDF2", salt:new TextEncoder().encode(REFRESH_SALT), iterations:REFRESH_ITER, hash:"SHA-256"}, bk, 256);
  return [...new Uint8Array(bits)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function setRefreshLabel(txt, disabled){ const b=document.getElementById("refreshBtn"); if(b){ b.textContent=txt; b.disabled=!!disabled; } }

async function refreshFromGarmin(){
  if(refreshing) return;
  const pass=getPass();
  if(!pass){ alert("Najpierw odblokuj dane hasłem, potem odśwież."); return; }
  if(!REFRESH_URL || REFRESH_URL.indexOf("REPLACE-ME")>=0){
    alert("Brak skonfigurowanego adresu Workera.\nUzupełnij REFRESH_URL w index.html (instrukcja: REFRESH_SETUP.md)."); return; }
  refreshing=true; setRefreshLabel("Uruchamiam aktualizację…", true);
  let auth;
  try{ auth=await deriveAuth(pass); }
  catch(e){ refreshing=false; setRefreshLabel("🔄 Odśwież dane z Garmina", false); alert("Nie udało się przygotować autoryzacji (wymaga HTTPS)."); return; }
  try{
    const res=await fetch(REFRESH_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({auth})});
    if(res.status===401) throw new Error("Odmowa: hasło nie pasuje do konfiguracji Workera.");
    if(!res.ok) throw new Error("Worker zwrócił błąd ("+res.status+").");
  }catch(e){ refreshing=false; setRefreshLabel("🔄 Odśwież dane z Garmina", false); alert(e.message||"Błąd sieci przy uruchamianiu aktualizacji."); return; }
  // Czekamy, az GitHub Actions zapisze nowy plik (nowy commit -> zmienione 'ct').
  setRefreshLabel("Aktualizuję… (do ~3 min)", true);
  const started=Date.now(), MAXMS=6*60*1000;
  while(Date.now()-started<MAXMS){
    await sleep(12000);
    try{
      const res=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
      if(res.ok){
        const blob=await res.json();
        if(blob && blob.ct && blob.ct!==lastCt){
          const rows=await decryptBlob(blob, pass);
          if(Array.isArray(rows)&&rows.length){ lastCt=blob.ct; gar={importedAt:Date.now(),rows,source:"auto"}; refreshing=false; render(); return; }
        }
      }
    }catch(e){}
  }
  refreshing=false; setRefreshLabel("🔄 Odśwież dane z Garmina", false);
  alert("Aktualizacja trwa dłużej niż zwykle. Nowe dane pojawią się po zakończeniu zadania — odśwież ekran za chwilę.");
}

// --- Deszyfrowanie (zgodne 1:1 z update_garmin.py: PBKDF2-SHA256 -> AES-256-GCM) ---
function b64ToBytes(s){ const b=atob(s), u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u; }
async function decryptBlob(blob, pass){
  const baseKey=await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64ToBytes(blob.salt), iterations:blob.iter, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(blob.iv)}, key, b64ToBytes(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
// Haslo: zapamietane na TYM urzadzeniu (localStorage), zeby nie podawac go po kazdym odswiezeniu.
// Ochrona danych opiera sie wtedy na blokadzie urzadzenia. Mozesz je wyczyscic: „zapomnij haslo" w stopce.
let _pass=null;
function getPass(){ if(_pass!=null) return _pass; const p=load('pw-v1', null); if(p!=null) _pass=p; return _pass; }
function setPass(p){ _pass=p; try{ if(p) localStorage.setItem('pw-v1', JSON.stringify(p)); else localStorage.removeItem('pw-v1'); }catch(e){} }
function forgetPass(){ setPass(null); gar=null; render(); }

async function fetchRemote(){
  let blob;
  try{
    const res=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!res.ok) return;                 // brak pliku (jeszcze) -> import reczny dalej dziala
    blob=await res.json();
  }catch(e){ return; }                  // offline -> zostaja dane z localStorage
  // Zgodnosc wsteczna: gdyby plik byl kiedys zwykla (niezaszyfrowana) tablica.
  if(Array.isArray(blob)){
    if(blob.length){ gar={importedAt:Date.now(),rows:blob,source:"auto"}; render(); }   // tylko w pamieci
    return;
  }
  if(!blob || blob.v!==1 || !blob.ct) return;   // nieznany format
  if(!("subtle" in (window.crypto||{}))){ console.warn("Web Crypto wymaga HTTPS"); return; }
  let pass=getPass();
  for(let i=0;i<3;i++){
    if(!pass){ pass=prompt("Haslo do odszyfrowania danych (DATA_PASSPHRASE):"); if(!pass) return; }
    try{
      const rows=await decryptBlob(blob, pass);
      if(Array.isArray(rows)&&rows.length){
        setPass(pass);
        lastCt=blob.ct;
        gar={importedAt:Date.now(),rows,source:"auto"};   // tylko w pamieci
        render();
      }
      return;
    }catch(e){ setPass(null); pass=null; }       // zle haslo -> pytaj ponownie
  }
  alert("Nie udalo sie odszyfrowac danych (bledne haslo?).");
}
render();
fetchPlan();
fetchRemote();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
